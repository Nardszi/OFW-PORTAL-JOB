<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="0" y="0" width="200" height="200" rx="40" fill="url(#bgGradient)"/>
  
  <!-- Decorative globe/world element -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>
  <path d="M 100 30 Q 120 100, 100 170" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>
  <path d="M 100 30 Q 80 100, 100 170" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>
  <line x1="30" y1="100" x2="170" y2="100" stroke="white" stroke-width="2" opacity="0.15"/>
  
  <!-- Main OFW Text -->
  <g transform="translate(100, 105)">
    <!-- O -->
    <path d="M -55 -20 C -55 -32, -48 -38, -38 -38 C -28 -38, -21 -32, -21 -20 L -21 20 C -21 32, -28 38, -38 38 C -48 38, -55 32, -55 20 Z M -47 -20 L -47 20 C -47 28, -43 30, -38 30 C -33 30, -29 28, -29 20 L -29 -20 C -29 -28, -33 -30, -38 -30 C -43 -30, -47 -28, -47 -20 Z" 
          fill="white" stroke="white" stroke-width="1"/>
    
    <!-- F -->
    <rect x="-12" y="-38" width="8" height="76" rx="2" fill="white"/>
    <rect x="-12" y="-38" width="28" height="8" rx="2" fill="white"/>
    <rect x="-12" y="-5" width="23" height="8" rx="2" fill="white"/>
    
    <!-- W -->
    <path d="M 20 -38 L 28 -38 L 35 15 L 42 -38 L 50 -38 L 57 15 L 64 -38 L 72 -38 L 62 38 L 54 38 L 46 -10 L 38 38 L 30 38 Z" 
          fill="white" stroke="white" stroke-width="0.5"/>
  </g>
  
  <!-- Accent elements - representing people/workers -->
  <g opacity="0.3">
    <circle cx="40" cy="50" r="8" fill="white"/>
    <path d="M 32 62 Q 40 58, 48 62 L 48 70 L 32 70 Z" fill="white"/>
    
    <circle cx="160" cy="50" r="8" fill="white"/>
    <path d="M 152 62 Q 160 58, 168 62 L 168 70 L 152 70 Z" fill="white"/>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="50" y="165" width="100" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>
